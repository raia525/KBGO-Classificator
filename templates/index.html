<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deteksi KBGO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav>
    <div class="nav-container">
        <div class="logo-group">
            <img src="{{ url_for('static', filename='images/Logo Tel-U.png') }}" alt="Logo Tel-U">
            <img src="{{ url_for('static', filename='images/Logo AILO Horizontal.png') }}" alt="Logo AILO">
            <img src="{{ url_for('static', filename='images/Logo Inar Aksara.png') }}" alt="Logo Inar Aksara">
        </div>
        <div class="nav-links">
            <a href="{{ url_for('index') }}" class="active">Home</a>
            <a href="{{ url_for('about') }}">About</a>
            <a href="{{ url_for('peneliti') }}">Peneliti</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="card">
        <h2>Cek Potensi KBGO</h2>
        <p class="description">Analisis teks untuk mendeteksi unsur kekerasan berbasis gender.</p>
        
        <form id="form">
            <textarea id="text" placeholder="Masukkan atau tempel teks di sini..."></textarea>
            
            <div class="button-group">
                <button type="submit" id="submitBtn">Analisis Sekarang</button>
                <button type="button" id="refreshBtn">Tes Ulang</button>
            </div>
        </form>

        <div id="result"></div>
    </div>
</div>

<footer>
    <p>&copy; 2026 Deteksi KBGO Indonesia. All rights reserved.</p>
</footer>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
